<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Dragon Repeller</title>
    
    <style>
        body {
            background-color: #0a0a23; /* Dark Blue */
            font-family: sans-serif;
        }

        #game {
            max-width: 500px;
            max-height: 400px;
            background-color: #ffffff;
            color: #0a0a23;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
        }

        #controls, #stats {
            border: 1px solid #0a0a23;
            padding: 10px;
            margin-bottom: 10px;
        }

        #monsterStats {
            display: none;
            border: 1px solid #0a0a23;
            padding: 10px;
            background-color: #c70d0d;
            color: white;
            margin-bottom: 10px;
        }

        .stat {
            padding-right: 15px;
        }

        #text {
            background-color: #0a0a23;
            color: #ffffff;
            padding: 15px;
            min-height: 100px;
            line-height: 1.5;
        }

        button {
            cursor: pointer;
            color: #0a0a23;
            background-color: #feac32;
            background-image: linear-gradient(#feac32, #ffbd5b);
            border: 3px solid #feac32;
            padding: 5px;
        }

        button:hover {
            background-color: #ffbd5b;
        }
    </style>
</head>
<body>
    <div id="game">
        <div id="stats">
            <span class="stat">XP: <strong><span id="xpText">0</span></strong></span>
            <span class="stat">Health: <strong><span id="healthText">100</span></strong></span>
            <span class="stat">Gold: <strong><span id="goldText">50</span></strong></span>
        </div>

        <div id="controls">
            <button id="button1">Go to store</button>
            <button id="button2">Go to cave</button>
            <button id="button3">Fight dragon</button>
        </div>

        <div id="monsterStats">
            <span class="stat">Monster: <strong><span id="monsterName"></span></strong></span>
            <span class="stat">Health: <strong><span id="monsterHealth"></span></strong></span>
        </div>

        <div id="text">
            Welcome to Dragon Repeller. You must defeat the dragon that is preventing people from leaving the town. You are in the town square. Where do you want to go? Use the buttons above.
        </div>
    </div>

    <script>
        let xp = 0;
        let health = 100;
        let gold = 50;
        let currentWeapon = 0;
        let fighting;
        let monsterHealth;
        let inventory = ["stick"];

        const button1 = document.querySelector('#button1');
        const button2 = document.querySelector('#button2');
        const button3 = document.querySelector('#button3');
        const text = document.querySelector('#text');
        const xpText = document.querySelector('#xpText');
        const healthText = document.querySelector('#healthText');
        const goldText = document.querySelector('#goldText');
        const monsterStats = document.querySelector('#monsterStats');
        const monsterName = document.querySelector('#monsterName');
        const monsterHealthText = document.querySelector('#monsterHealth');

        // Initial actions
        button1.onclick = goStore;
        button2.onclick = goCave;
        button3.onclick = fightDragon;

        function update(location) {
            monsterStats.style.display = "none";
            button1.innerText = location["button text"][0];
            button2.innerText = location["button text"][1];
            button3.innerText = location["button text"][2];
            button1.onclick = location["button functions"][0];
            button2.onclick = location["button functions"][1];
            button3.onclick = location["button functions"][2];
            text.innerText = location.text;
        }

        function goTown() {
            button1.innerText = "Go to store";
            button2.innerText = "Go to cave";
            button3.innerText = "Fight dragon";
            button1.onclick = goStore;
            button2.onclick = goCave;
            button3.onclick = fightDragon;
            text.innerText = "You are back in the town square.";
        }

        function goStore() {
            button1.innerText = "Buy 10 health (10 gold)";
            button2.innerText = "Buy weapon (30 gold)";
            button3.innerText = "Go to town square";
            button1.onclick = buyHealth;
            button2.onclick = buyWeapon;
            button3.onclick = goTown;
            text.innerText = "You enter the store.";
        }

        function goCave() {
            text.innerText = "You enter the cave. You see some monsters.";
            button1.innerText = "Fight slime";
            button2.innerText = "Fight fanged beast";
            button3.innerText = "Go to town square";
            button1.onclick = () => { console.log("Fighting slime"); };
            button2.onclick = () => { console.log("Fighting beast"); };
            button3.onclick = goTown;
        }

        function buyHealth() {
            if (gold >= 10) {
                gold -= 10;
                health += 10;
                goldText.innerText = gold;
                healthText.innerText = health;
                text.innerText = "You feel rejuvenated!";
            } else {
                text.innerText = "You do not have enough gold!";
            }
        }

        function buyWeapon() {
            if (gold >= 30) {
                gold -= 30;
                goldText.innerText = gold;
                text.innerText = "You bought a better weapon!";
            } else {
                text.innerText = "You need more gold for a weapon.";
            }
        }

        function fightDragon() {
            text.innerText = "The dragon is too powerful right now! You should train first.";
        }
    </script>
</body>
</html>
